name: "Publish Test Results"

on:
  workflow_run:
    workflows: [ "Build" ]
    types:
      - completed

jobs:
  action:
    name: "Action"
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write # needed unless run with comment_mode: off
      contents: read # only needed for private repository
      issues: read # only needed for private repository
      actions: read # required by download step to access artifacts API
    steps:

      - name: "Download and Extract Test Results"
        uses: dawidd6/action-download-artifact@8305c0f1062bb0d184d09ef4493ecb9288447732 # v20
        with:
          run_id: ${{ github.event.workflow_run.id }}
          path: artifacts
          name: test-results|event-file
          name_is_regexp: true

      - name: "Publish Test Results"
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        with:
          commit: ${{ github.event.workflow_run.head_sha }}
          event_file: artifacts/event-file/event.json
          event_name: ${{ github.event.workflow_run.event }}
          files: "artifacts/**/*.xml"