name: "Build"

on:
  push:
    branches: [ "**" ]
    tags-ignore: [ "**" ]
  pull_request:
  release:
    types: [ released, prereleased ]

concurrency:
  group: "${{ github.workflow }}-${{ github.event.number || github.ref }}"
  cancel-in-progress: true

env:
  ORG_GRADLE_PROJECT_release: ${{ github.event_name == 'release' }}

jobs:
  action:
    name: "Action"
    # Only run on PRs if the source branch is on someone else's repo
    if: ${{ github.event_name != 'pull_request' || github.repository != github.event.pull_request.head.repo.full_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: "Checkout Repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: "Checkout CI Scripts"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: xpdustry/.github
          path: .xpdustry-ci
          sparse-checkout: scripts

      - name: "Setup Java 25"
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: "Setup Gradle"
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: "Get And Validate Version"
        id: version
        run: |
          version="$(./gradlew properties -q | grep '^version:' | cut -d ':' -f 2 | xargs)"
          .xpdustry-ci/scripts/version-validate.sh "$version" "$ORG_GRADLE_PROJECT_release"
          echo "version=${version%-SNAPSHOT}" >> "$GITHUB_OUTPUT"

      - name: "Build Gradle"
        run: ./gradlew build

      - name: "Upload Artifacts"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: artifacts
          path: "build/libs/nohorny.jar"
          if-no-files-found: error

      - name: "Upload Test Results"
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: test-results
          path: |
            **/build/test-results/test/TEST-*.xml
            **/build/reports/

      - name: "Publish to Maven"
        if: ${{ github.event_name == 'release' || startsWith(github.ref, 'refs/heads/master') || startsWith(github.ref, 'refs/heads/dev') }}
        run: ./gradlew publish
        env:
          ORG_GRADLE_PROJECT_xpdustryUsername: "${{ secrets.XPDUSTRY_MAVEN_USERNAME }}"
          ORG_GRADLE_PROJECT_xpdustryPassword: "${{ secrets.XPDUSTRY_MAVEN_PASSWORD }}"
          ORG_GRADLE_PROJECT_signingKey: "${{ secrets.XPDUSTRY_MAVEN_SIGNING_KEY }}"
          ORG_GRADLE_PROJECT_signingPassword: "${{ secrets.XPDUSTRY_MAVEN_SIGNING_PASSWORD }}"

      - name: "Publish to GitHub"
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: "build/libs/nohorny.jar"

      - name: "Update Changelog"
        if: ${{ github.event_name == 'release' }}
        uses: stefanzweifel/changelog-updater-action@a938690fad7edf25368f37e43a1ed1b34303eb36 # v1
        with:
          latest-version: ${{ github.event.release.tag_name }}
          release-notes: ${{ github.event.release.body }}

      - name: "Bump Version"
        if: ${{ github.event_name == 'release' }}
        run: .xpdustry-ci/scripts/version-bump.sh "build.gradle.kts" "${{ steps.version.outputs.version }}"

      - name: "Commit Release Changes"
        if: ${{ github.event_name == 'release' }}
        uses: planetscale/ghcommit-action@25309d8005ac7c3bcd61d3fe19b69e0fe47dbdde # v0.2.20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commit_message: "chore(release): Post v${{ steps.version.outputs.version }} changes"
          repo: ${{ github.repository }}
          branch: ${{ github.event.release.target_commitish }}
          file_pattern: "build.gradle.kts CHANGELOG.md"

  event-file:
    name: "Event File"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:

      - name: "Upload Event File"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: event-file
          path: ${{ github.event_path }}