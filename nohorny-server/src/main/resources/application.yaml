spring:
  application.name: nohorny
  # Disable the default HTML error page.
  web.error.whitelabel.enabled: false
  jpa:
    # The schema is managed by database/schema.sql.
    hibernate.ddl-auto: none
    open-in-view: false

server:
  # Listen on localhost. Use 0.0.0.0 to expose the API on your network.
  address: 127.0.0.1
  # HTTP port used for the app
  port: 8080

nohorny:
  database:
    # SQLite database shared by the server and CLI commands.
    path: nohorny.db
  security:
    # ALLOW_ALL permits anonymous classification. DENY_ALL requires a user with the API role.
    api-default-policy: ALLOW_ALL
  requests:
    # Number of recent classification requests retained in the database.
    capacity: 100
  classifier:
    # Use vit for using a local model, or sight-engine to classify through SightEngine.
    type: vit
    vit:
      source:
        type: hugging-face
        hugging-face:
          # Hugging Face repository that contains the model file.
          repository: phinner/nsfw_image_detection
          # Repository revision to download from. Pinning a commit keeps deployments reproducible.
          revision: aab8ebd004112c8358a8ff9709c0492c2ba96bdc
          # Model file loaded from the repository and revision above.
          file: falconsai_nsfw_image_detection.pt
          # Local directory for downloaded model files.
          download-directory: .cached-models
          # Only needed for private or gated Hugging Face models.
          # token: ${HF_TOKEN}
        local:
          path: my_model.pt
      # Labels returned by the model, in the same order as its output probabilities.
      labels:
        - normal
        - nsfw
      # Which label from the list above is treated as the NSFW score.
      nsfw-label: nsfw
      # DJL engine used to load the model. The bundled model uses PyTorch.
      # Switch to OnnxRuntime only if you also point file to a compatible ONNX model.
      engine: PyTorch
      thresholds:
        # Scores below warn are SAFE. Scores from warn up to nsfw are WARN.
        warn: 0.6
        # Scores at or above nsfw are NSFW. Keep this greater than or equal to warn.
        nsfw: 0.9
    # Enable sight-engine by setting nohorny.classifier.type to sight-engine
    sight-engine:
      # SightEngine API user.
      user: ${SIGHT_ENGINE_USER}
      # SightEngine API secret.
      secret: ${SIGHT_ENGINE_SECRET}
      thresholds:
        # Scores below warn are SAFE. Scores from warn up to nsfw are WARN.
        warn: 0.4
        # Scores at or above nsfw are NSFW. Keep this greater than or equal to warn.
        nsfw: 0.55
  status:
    motd: ok
